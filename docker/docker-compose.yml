---
services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "${NPM_HTTP_PORT}:80"
      - "${NPM_HTTPS_PORT}:443"
      - "${NPM_ADMIN_PORT}:81"
    environment:
      TZ: "${TZ}"
    volumes:
      - "${NPM_DATA_PATH}:/data"
      - "${NPM_LETSENCRYPT_PATH}:/etc/letsencrypt"
    networks:
      - proxy

networks:
  proxy:
    name: proxy
    driver: bridge
