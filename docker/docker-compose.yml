---
services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "${NPM_HTTP_PORT}:80"
      - "${NPM_HTTPS_PORT}:443"
    environment:
      TZ: "${TZ}"
    volumes:
      - "${NPM_DATA_PATH}:/data"
      - "${NPM_LETSENCRYPT_PATH}:/etc/letsencrypt"
    networks:
      - proxy

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    environment:
      TZ: "${TZ}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - "${PORTAINER_DATA_PATH}:/data"
    networks:
      - proxy

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    environment:
      TZ: "${TZ}"
    volumes:
      - "${UPTIME_KUMA_DATA_PATH}:/app/data"
    networks:
      - proxy

  homelab-portal:
    image: ghcr.io/frikzai/docker-secure-platform/homelab-portal:latest
    container_name: homelab-portal
    restart: unless-stopped
    environment:
      TZ: "${TZ}"
      BACKUP_DIR: "${HOMELAB_PORTAL_BACKUP_DIR}"
      CHECK_TIMEOUT: "${HOMELAB_PORTAL_CHECK_TIMEOUT}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/backups/docker-secure-platform:/backups:ro
    networks:
      - proxy

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      TZ: "${TZ}"
      DOMAIN: "${VAULTWARDEN_DOMAIN}"
      ADMIN_TOKEN: "${VAULTWARDEN_ADMIN_TOKEN}"
      SIGNUPS_ALLOWED: "${VAULTWARDEN_SIGNUPS_ALLOWED}"
      INVITATIONS_ALLOWED: "false"
      WEBSOCKET_ENABLED: "true"
    volumes:
      - "${VAULTWARDEN_DATA_PATH}:/data"
    networks:
      - proxy

networks:
  proxy:
    name: proxy
    driver: bridge
