---
name: Build Homelab Portal Image

on:
  push:
    branches:
      - main
    paths:
      - "apps/homelab-portal/**"
      - ".github/workflows/homelab-portal-image.yml"

  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push homelab-portal image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/homelab-portal
          push: true
          tags: |
              ghcr.io/frikzai/docker-secure-platform/homelab-portal:latest
              ghcr.io/frikzai/docker-secure-platform/homelab-portal:${{ github.sha }}
